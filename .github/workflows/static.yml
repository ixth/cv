name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup Pages
        uses: actions/configure-pages@v2
      - name: Generate HTML using Pandoc
        uses: docker://ghcr.io/44smkn/pandoc/ja:0.1.1
        with:
          args: >-
            --from gfm
            --to html5
            --css styles/markdown.css
            --css styles/cv.css
            --output www/cv.html
            --standalone
            README.md
      - name: Generate PDF using Pandoc
        uses: docker://pandoc/latex:2.9
        with:
          args: >-
            --from gfm
            --to html
            --css styles/markdown.css
            --css styles/cv.css
            --output www/cv.pdf
            README.md
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: www/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
