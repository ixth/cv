name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_html:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Generate HTML using Pandoc
        uses: docker://ghcr.io/44smkn/pandoc/ja:0.1.1
        with:
          args: >-
            --from gfm
            --to html5
            --css styles/markdown.css
            --css styles/cv.css
            --output www/cv.html
            --standalone
            --self-contained
            README.md
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: www
          path: www/cv.html

  build_pdf:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Generate PDF using Pandoc
        uses: docker://ghcr.io/44smkn/pandoc/ja:0.1.1
        with:
          args: >-
            --from gfm
            --to html5
            --css styles/markdown.css
            --css styles/cv.css
            --output www/cv.pdf
            --self-contained
            --standalone
            README.md
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: www
          path: www/cv.pdf

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs:
      - build_pdf
      - build_html
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: www/
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1
